# Finance GRPO attacker training config.
# Victim/judge model endpoints come from .env unless explicitly set below.

policy_model: Qwen/Qwen2.5-3B-Instruct
output_dir: outputs/finance_grpo

target_facts:
  - rent_amount
  - rent_merchant
  - paycheck_amount
  - subscription_amount_spotify
  - budget_goal
  - rent_account
samples_per_fact: 64
mode: tool_optional
reward_mode: shaped
success_signal: scorer  # scorer | judge | hybrid
k: 5
seed: 0
target_model_name_or_path: Qwen/Qwen2.5-7B-Instruct
target_request_timeout: 300.0
target_max_retries: 6
judge_model: Qwen/Qwen2.5-7B-Instruct
judge_request_timeout: 300.0
judge_max_retries: 6
reward_max_concurrent: 4

learning_rate: 0.000005
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
num_generations: 4
max_completion_length: 256
max_steps: 200
save_steps: 50
logging_steps: 1
temperature: 0.9
beta: 0.04
bf16: true
gradient_checkpointing: true
report_to: none

use_peft: true
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05

curriculum:
  stage1:
    output_dir: outputs/finance_grpo_stage1_scorer_shaped
    reward_mode: shaped
    success_signal: scorer
    max_steps: 200
  stage2:
    output_dir: outputs/finance_grpo_stage2_judge_shaped
    reward_mode: shaped
    success_signal: judge
    max_steps: 300

smoke:
  output_dir: outputs/finance_grpo_smoke
  target_facts:
    - rent_amount
  samples_per_fact: 2
  max_steps: 1
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 1
  num_generations: 2
  max_completion_length: 128
