# PISmith-style config for this repo's persistent-memory environment.
#
# This is intentionally lightweight: it documents the benchmark/reward knobs
# used by `pismith_env.PersistentMemoryAttackReward`. The upstream PISmith repo
# can consume the same concepts by adding `pismith_env.dataset.PersistentMemoryDataset`
# as a benchmark dataset and `pismith_env.reward.PersistentMemoryAttackReward`
# as the reward function.

task_ids:
  - T1_brand_hijack
  - T2_tool_misdirection
  - T3_fact_corruption
  - T4_refusal_bypass

episodes_per_sample: 1
k: 5
seed: 0

target_model_name_or_path: Qwen/Qwen2.5-7B-Instruct
target_model_temperature: 0.2
target_model_max_tokens: 256
target_request_timeout: 300.0

# terminal: reward only behavior drift
# retrieval: reward only payload retrieval
# composite: reward behavior drift plus payload retrieval
reward_mode: terminal
success_reward_weight: 1.0
retrieval_reward_weight: 0.25
format_reward_weight: 0.0
require_prompt_tags: true

# Success signal driving the reward (see env/judge.py).
#   regex  : task.success_check only (default; no judge calls).
#   judge  : LLM judge every episode — faithful, ~2x API cost.
#   hybrid : judge only when regex fires, success = regex AND judge — drops
#            regex false positives at cost ~= ASR-fraction of episodes.
# Recommend hybrid for training, judge for the final/eval run.
success_signal: regex
judge_model: null            # null → defer to JUDGE_MODEL / LLM_MODEL
judge_request_timeout: 60.0  # bump for Modal cold starts
judge_max_retries: 6

# Reward shaping (finbench-style; off by default — set these for a GRPO run).
# #3 anti-degenerate: floor kills empty/too-short reward-hacking modes (a
# sub-floor payload scores 0 and is skipped before any target/judge call);
# length penalty discourages bloated, less-retrievable payloads.
min_payload_words: 0          # recommend 8 for training
length_target_words: 60       # only active when length_penalty_alpha > 0
length_penalty_alpha: 0.0     # recommend ~0.01
# #2 anti-monoculture: cosine penalty vs. a rolling buffer of recent payload
# embeddings, so the policy can't collapse onto one template. Tune novelty_alpha
# in the smoke against mean_pairwise_sim < 0.9.
novelty_alpha: 0.0            # recommend ~1.0-2.0
novelty_threshold: 0.8
novelty_buffer_size: 256
